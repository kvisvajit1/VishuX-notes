<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vishux Notes 💗✨</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #007AFF;
      --bg: #f2f2f7;
      --card: #ffffff;
      --text: #1c1c1e;
      --secondary-text: #8e8e93;
      --border: #d1d1d6;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      --dark-bg: #1c1c1e;
      --dark-card: #2c2c2e;
      --dark-text: #f2f2f7;
      --dark-secondary-text: #a8a8aa;
      --dark-border: #3a3a3c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      transition: background 0.3s, color 0.2s;
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body.dark {
      --bg: var(--dark-bg);
      --card: var(--dark-card);
      --text: var(--dark-text);
      --secondary-text: var(--dark-secondary-text);
      --border: var(--dark-border);
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo i {
      font-size: 20px;
    }

    .actions {
      display: flex;
      gap: 15px;
    }

    .btn {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 16px;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
    }

    .btn:hover {
      background: rgba(0, 122, 255, 0.1);
    }

    .btn i {
      margin-right: 5px;
    }

    /* Folders & Notes List */
    .sidebar {
      width: 250px;
      position: fixed;
      left: -260px;
      top: 0;
      height: 100vh;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 20px;
      z-index: 100;
      transition: transform 0.3s ease;
    }

    .sidebar.open {
      transform: translateX(260px);
      box-shadow: 10px 0 30px rgba(0, 0, 0, 0.1);
    }

    .sidebar h3 {
      margin-bottom: 15px;
      font-size: 18px;
      color: var(--secondary-text);
    }

    .folder-list {
      list-style: none;
    }

    .folder-item {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .folder-item:hover {
      background: rgba(0, 122, 255, 0.1);
    }

    .folder-item.active {
      background: rgba(0, 122, 255, 0.1);
      color: var(--primary);
    }

    .notes-list {
      margin-top: 20px;
    }

    .note-item {
      padding: 15px;
      background: var(--card);
      border-radius: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .note-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .note-item.pinned {
      border-left: 4px solid var(--primary);
    }

    .note-title {
      font-weight: 600;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-preview {
      color: var(--secondary-text);
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-date {
      font-size: 12px;
      color: var(--secondary-text);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Editor */
    .editor {
      flex: 1;
      padding: 20px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .tool-btn {
      background: none;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text);
    }

    .tool-btn:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    .tool-btn.active {
      background: rgba(0, 122, 255, 0.1);
      color: var(--primary);
    }

    #note-title {
      width: 100%;
      font-size: 24px;
      font-weight: 700;
      border: none;
      outline: none;
      background: none;
      color: var(--text);
      margin-bottom: 15px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }

    #note-content {
      width: 100%;
      min-height: 300px;
      border: none;
      outline: none;
      background: none;
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
      resize: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 80%;
        left: -85%;
      }
      .sidebar.open {
        transform: translateX(85%);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <button class="btn" id="menu-btn"><i class="fas fa-bars"></i></button>
      <div class="logo">
        <i class="fas fa-feather-alt"></i>
        <span>Vishux Notes</span>
      </div>
      <div class="actions">
        <button class="btn" id="theme-btn"><i class="fas fa-moon"></i></button>
        <button class="btn" id="new-note-btn"><i class="fas fa-plus"></i> New</button>
      </div>
    </header>

    <div class="sidebar" id="sidebar">
      <h3><i class="fas fa-folder"></i> Folders</h3>
      <ul class="folder-list" id="folder-list">
        <li class="folder-item active"><i class="fas fa-sticky-note"></i> All Notes</li>
        <li class="folder-item"><i class="fas fa-check-circle"></i> Checklists</li>
        <li class="folder-item"><i class="fas fa-star"></i> Pinned</li>
      </ul>

      <div class="notes-list" id="notes-list">
        <!-- Notes will be loaded here -->
      </div>
    </div>

    <div class="editor">
      <div class="toolbar">
        <button class="tool-btn" data-command="bold"><i class="fas fa-bold"></i></button>
        <button class="tool-btn" data-command="italic"><i class="fas fa-italic"></i></button>
        <button class="tool-btn" data-command="underline"><i class="fas fa-underline"></i></button>
        <button class="tool-btn" data-command="insertUnorderedList"><i class="fas fa-list-ul"></i></button>
        <button class="tool-btn" data-command="insertOrderedList"><i class="fas fa-list-ol"></i></button>
        <button class="tool-btn" id="pin-btn"><i class="fas fa-thumbtack"></i></button>
        <button class="tool-btn" id="save-btn"><i class="fas fa-save"></i></button>
      </div>
      <input type="text" id="note-title" placeholder="Title">
      <div id="note-content" contenteditable="true" placeholder="Start writing..."></div>
    </div>
  </div>

  <script>
    // DOM Elements
    const menuBtn = document.getElementById('menu-btn');
    const themeBtn = document.getElementById('theme-btn');
    const newNoteBtn = document.getElementById('new-note-btn');
    const sidebar = document.getElementById('sidebar');
    const notesList = document.getElementById('notes-list');
    const noteTitle = document.getElementById('note-title');
    const noteContent = document.getElementById('note-content');
    const pinBtn = document.getElementById('pin-btn');
    const saveBtn = document.getElementById('save-btn');
    const folderList = document.getElementById('folder-list');

    // State
    let notes = JSON.parse(localStorage.getItem('vishux-notes')) || [];
    let currentNoteId = null;
    let isPinned = false;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadNotes();
      applyTheme();
    });

    // Toggle Sidebar
    menuBtn.addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });

    // Toggle Theme
    themeBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('vishux-theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    });

    // Apply saved theme
    function applyTheme() {
      const savedTheme = localStorage.getItem('vishux-theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark');
        themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
      }
    }

    // Create New Note
    newNoteBtn.addEventListener('click', () => {
      currentNoteId = Date.now().toString();
      noteTitle.value = '';
      noteContent.innerHTML = '';
      isPinned = false;
      pinBtn.classList.remove('active');
    });

    // Save Note
    saveBtn.addEventListener('click', saveNote);

    function saveNote() {
      if (!noteTitle.value.trim()) return;

      const note = {
        id: currentNoteId || Date.now().toString(),
        title: noteTitle.value,
        content: noteContent.innerHTML,
        pinned: isPinned,
        date: new Date().toLocaleString(),
      };

      const existingIndex = notes.findIndex(n => n.id === note.id);
      if (existingIndex >= 0) {
        notes[existingIndex] = note;
      } else {
        notes.unshift(note);
      }

      localStorage.setItem('vishux-notes', JSON.stringify(notes));
      loadNotes();
    }

    // Load Notes
    function loadNotes() {
      notesList.innerHTML = '';
      const filteredNotes = notes.filter(note => !note.pinned);

      if (notes.length === 0) {
        notesList.innerHTML = '<p style="color: var(--secondary-text); padding: 20px; text-align: center;">No notes yet. Create one!</p>';
        return;
      }

      notes.forEach(note => {
        const noteEl = document.createElement('div');
        noteEl.className = `note-item ${note.pinned ? 'pinned' : ''}`;
        noteEl.innerHTML = `
          <div class="note-title">${note.title || 'Untitled'}</div>
          <div class="note-preview">${note.content.replace(/<[^>]*>/g, '').substring(0, 60)}...</div>
          <div class="note-date"><i class="far fa-clock"></i> ${note.date}</div>
        `;
        noteEl.addEventListener('click', () => openNote(note.id));
        notesList.appendChild(noteEl);
      });
    }

    // Open Note
    function openNote(id) {
      const note = notes.find(n => n.id === id);
      if (!note) return;

      currentNoteId = note.id;
      noteTitle.value = note.title;
      noteContent.innerHTML = note.content;
      isPinned = note.pinned;
      pinBtn.classList.toggle('active', isPinned);
    }

    // Toggle Pin
    pinBtn.addEventListener('click', () => {
      isPinned = !isPinned;
      pinBtn.classList.toggle('active');
      if (currentNoteId) {
        const note = notes.find(n => n.id === currentNoteId);
        if (note) note.pinned = isPinned;
        localStorage.setItem('vishux-notes', JSON.stringify(notes));
        loadNotes();
      }
    });

    // Rich Text Editor
    document.querySelectorAll('.tool-btn[data-command]').forEach(btn => {
      btn.addEventListener('click', () => {
        const command = btn.getAttribute('data-command');
        document.execCommand(command, false, null);
        noteContent.focus();
      });
    });
  </script>
</body>
</html>
